<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VLESS节点生成器 | 纯文本订阅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            padding: 28px;
        }
        h1 { color: #1e293b; margin-bottom: 20px; font-size: 1.9rem; text-align: center; }
        .copy-all-btn {
            display: inline-block;
            padding: 12px 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }
        .generate-btn { background-color: #FF9800; }
        .blob-btn { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .copy-all-btn:hover { transform: translateY(-1px); filter: brightness(1.02); }
        .input-group { margin: 18px 0; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #0f172a; font-size: 0.85rem; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.9rem;
        }
        .helper-note {
            font-size: 12px;
            color: #ea580c;
            text-align: center;
            background: #fff7ed;
            padding: 8px 12px;
            border-radius: 40px;
            margin: 14px 0;
        }
        .flex-btns { display: flex; gap: 12px; justify-content: center; margin: 20px 0 12px; flex-wrap: wrap; }
        .temp-link-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 16px 18px;
            margin: 20px 0 0;
            border: 1px solid #e2e8f0;
            display: none;
        }
        .temp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .blob-url-text {
            background: white;
            padding: 8px 12px;
            border-radius: 14px;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            border: 1px solid #cbd5e1;
            user-select: all;
            margin: 8px 0;
        }
        .small-btn {
            background: #334155;
            padding: 6px 16px;
            font-size: 0.75rem;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .node-count-badge {
            background: #e2e8f0;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin: 5px 0;
        }
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1000;
            white-space: nowrap;
        }
        @media (max-width: 680px) {
            .container { padding: 18px; }
            .flex-btns { flex-direction: column; }
            .copy-all-btn { width: 100%; }
        }
        .badge { background: #e9ecef; border-radius: 30px; padding: 2px 10px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
        <a href="https://github.com/gslege/CloudflareIP" target="_blank" style="color: #FF9800; text-decoration: none; font-weight: 600;">📦 作者GitHub</a>
    </div>
    <h1>✈️ VLESS 节点生成器</h1>
    <div class="helper-note">⚡ 支持自定义Path（例: /?ed=2560） | 纯文本订阅，无Base64</div>

    <div class="input-group">
        <label>🔑 UUID</label>
        <input type="text" id="uuidInput" value="7c45da23-4924-47eb-8426-45017280e5e7">
    </div>
    <div class="input-group">
        <label>🌐 部署域名 (SNI/Host)</label>
        <input type="text" id="domainInput" value="img.xiguanjiuhao33.ccwu.cc">
    </div>
    <div class="input-group">
        <label>🛸 反代IP (传统模式)</label>
        <input type="text" id="custom3Input" value="bpb.yousef.isegaro.com">
    </div>
    <div class="input-group">
        <label>🛤️ 自定义Path (可选)</label>
        <input type="text" id="customPathInput" placeholder="/?ed=2560&PROT_TYPE=vless">
    </div>
    <div class="input-group">
        <label>📡 IP/域名来源</label>
        <select id="presetIpSelect">
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt">🇨🇳 me运营商IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt">🇸🇬 sg新加坡IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt">🇯🇵 jp日本IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt">🇺🇸 us美国IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/DE.txt">🇩🇪 de德国IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/NL.txt">🇳🇱 nl荷兰IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/country.txt">🌍 country网络IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cdtools.txt">⚡ cdtools优选IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt">📡 cf测速IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/More.txt">📚 more更多IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Domain.txt">🔗 domain优选域名</option>
        </select>
        <input type="text" id="ipSourceInput" style="margin-top: 10px;" placeholder="或自定义URL" value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt">
    </div>

    <div class="flex-btns">
        <button id="generateBtn" class="copy-all-btn generate-btn">🚀 生成节点</button>
        <button id="copyAllBtn" class="copy-all-btn">📋 复制全部节点</button>
        <button id="downloadTxtBtn" class="copy-all-btn">💾 下载 .txt</button>
        <button id="genBlobLinkBtn" class="copy-all-btn blob-btn">🔗 生成临时 .txt 链接</button>
    </div>

    <!-- 显示节点数量 -->
    <div style="text-align: center; margin: 10px 0;">
        <span id="nodeCountDisplay" class="node-count-badge">📭 暂无节点</span>
    </div>

    <!-- 临时链接展示区域 (生成按钮下方，节点列表上方) -->
    <div id="tempLinkCard" class="temp-link-card">
        <div class="temp-header">
            <span>🔗 临时订阅链接 (blob:协议)</span>
            <div>
                <button id="copyTempLinkBtn" class="small-btn">📋 复制链接</button>
                <button id="openTempLinkBtn" class="small-btn">🌐 新标签页打开</button>
            </div>
        </div>
        <div id="tempLinkUrl" class="blob-url-text">暂无，请先点击「生成临时 .txt 链接」</div>
        <div style="font-size: 11px; color: #dc2626; margin-top: 8px;">
            ⚠️ 该链接仅在当前标签页有效，刷新即失效。<br>
            ❌ 大多数代理客户端（v2rayNG/Clash）不支持 blob: 协议。<br>
            ✅ 推荐使用「下载 .txt」或「复制全部节点」导入客户端。
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
    (function(){
        // DOM 元素
        const uuidInput = document.getElementById('uuidInput');
        const domainInput = document.getElementById('domainInput');
        const custom3Input = document.getElementById('custom3Input');
        const customPathInput = document.getElementById('customPathInput');
        const ipSourceInput = document.getElementById('ipSourceInput');
        const presetSelect = document.getElementById('presetIpSelect');
        const generateBtn = document.getElementById('generateBtn');
        const copyAllBtn = document.getElementById('copyAllBtn');
        const downloadTxtBtn = document.getElementById('downloadTxtBtn');
        const genBlobLinkBtn = document.getElementById('genBlobLinkBtn');
        const resultsDiv = document.getElementById('results');
        const nodeCountDisplay = document.getElementById('nodeCountDisplay');
        const tempLinkCard = document.getElementById('tempLinkCard');
        const tempLinkUrl = document.getElementById('tempLinkUrl');
        const copyTempLinkBtn = document.getElementById('copyTempLinkBtn');
        const openTempLinkBtn = document.getElementById('openTempLinkBtn');

        const DEFAULTS = {
            uuid: '7c45da23-4924-47eb-8426-45017280e5e7',
            domain: 'img.xiguanjiuhao33.ccwu.cc',
            custom3: 'bpb.yousef.isegaro.com',
            ipSource: 'https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt'
        };

        let currentVlessLinks = [];
        let currentBlobUrl = null;

        function showToast(msg, duration=1800) {
            let toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function updateNodeCountDisplay() {
            const count = currentVlessLinks.length;
            if (count === 0) {
                nodeCountDisplay.innerHTML = '📭 暂无节点 (请先点击“生成节点”)';
                nodeCountDisplay.style.background = '#fee2e2';
            } else {
                nodeCountDisplay.innerHTML = `✅ 当前 ${count} 个节点`;
                nodeCountDisplay.style.background = '#dcfce7';
            }
        }

        function buildVlessLink(ipOrDomain, nodeName, uuid, domain, custom3, customPath) {
            const baseParams = {
                encryption: 'none', security: 'tls', sni: domain, fp: 'random',
                insecure: '0', allowInsecure: '0', type: 'ws', host: domain
            };
            let finalPath = (customPath && customPath.trim()) ? customPath.trim() : `pyip=${custom3}`;
            let encodedPath = encodeURIComponent(finalPath);
            let query = Object.entries(baseParams).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&') + `&path=${encodedPath}`;
            let encodedName = encodeURIComponent(nodeName);
            return `vless://${uuid}@${ipOrDomain}:443?${query}#${encodedName}`;
        }

        async function generateNodes(uuid, domain, ipSourceUrl, custom3, customPath) {
            resultsDiv.innerHTML = '<p>⏳ 正在获取IP/域名列表...</p>';
            // 隐藏临时链接卡片
            tempLinkCard.style.display = 'none';
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            try {
                const resp = await fetch(ipSourceUrl);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const text = await resp.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                const ipDomainRegex = /^((?:\d{1,3}\.){3}\d{1,3}|(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,})$/;
                let nodes = [];
                for (let i=0; i<lines.length; i++) {
                    let line = lines[i].trim();
                    let ipOrDomain = '', nodeName = '';
                    if (line.includes('#')) {
                        let parts = line.split('#');
                        ipOrDomain = parts[0].trim();
                        nodeName = parts.slice(1).join('#').trim() || `节点${i+1}`;
                    } else {
                        ipOrDomain = line;
                        nodeName = `节点${i+1}`;
                    }
                    if (!ipDomainRegex.test(ipOrDomain)) continue;
                    let link = buildVlessLink(ipOrDomain, nodeName, uuid, domain, custom3, customPath);
                    nodes.push({ name: nodeName, link });
                }
                if (nodes.length === 0) throw new Error('未找到有效IP/域名，请检查来源格式');
                currentVlessLinks = nodes.map(n => n.link);
                updateNodeCountDisplay();
                // 渲染列表
                let html = '<ul style="list-style:none; padding:0;">';
                for (let item of nodes) {
                    html += `<li data-link="${escapeHtml(item.link)}" style="background:#f8fafc; border-radius:20px; padding:14px; margin-bottom:14px; border-left:5px solid #FF9800; cursor:pointer; position:relative;">
                        <div style="font-weight:700; color:#ea580c;">📡 ${escapeHtml(item.name)} <span class="badge">点击复制</span></div>
                        <div style="font-size:0.75rem; background:#eef2ff; padding:8px; border-radius:14px; margin-top:6px; word-break:break-all;">${escapeHtml(item.link)}</div>
                        <span class="copy-tip" style="position:absolute; right:16px; top:18px; background:#10b981; color:white; padding:4px 12px; border-radius:30px; font-size:0.7rem; opacity:0; transition:0.2s;">✓ 已复制</span>
                    </li>`;
                }
                html += `</ul><p style="text-align:center; margin-top:15px;">✨ 共生成 ${nodes.length} 个VLESS节点</p>`;
                resultsDiv.innerHTML = html;
                attachCopyEvents();
                showToast(`✅ 成功生成 ${nodes.length} 个节点`, 1500);
            } catch(err) {
                resultsDiv.innerHTML = `<p>💥 生成失败: ${err.message}</p>`;
                currentVlessLinks = [];
                updateNodeCountDisplay();
            }
        }

        function attachCopyEvents() {
            document.querySelectorAll('#results li').forEach(li => {
                if (li.dataset.listener) return;
                li.dataset.listener = 'true';
                li.addEventListener('click', async (e) => {
                    let link = li.dataset.link;
                    if (!link) {
                        let div = li.querySelector('div[style*="font-size:0.75rem"]');
                        if (div) link = div.innerText;
                    }
                    if (!link) return;
                    try {
                        await navigator.clipboard.writeText(link);
                        let tip = li.querySelector('.copy-tip');
                        if (tip) tip.style.opacity = '1';
                        li.style.backgroundColor = '#dcfce7';
                        setTimeout(() => {
                            li.style.backgroundColor = '';
                            if (tip) tip.style.opacity = '0';
                        }, 800);
                        showToast('✓ 节点已复制', 800);
                    } catch(e) {}
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function getPlainText() {
            return currentVlessLinks.join('\n');
        }

        async function copyAllNodes() {
            if (!currentVlessLinks.length) { showToast('无节点可复制', 1000); return; }
            await navigator.clipboard.writeText(getPlainText());
            showToast(`📋 已复制 ${currentVlessLinks.length} 个节点`, 1500);
        }

        function downloadTxtFile() {
            if (!currentVlessLinks.length) { showToast('无节点', 1000); return; }
            const blob = new Blob([getPlainText()], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vless_sub_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已下载 .txt 文件', 1500);
        }

        // 生成临时 blob 链接并显示在卡片中
        function generateAndShowBlobLink() {
            if (!currentVlessLinks.length) {
                showToast('❌ 请先点击「生成节点」获取节点列表', 2000);
                return;
            }
            // 清理旧的 blob URL
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = null;
            }
            const plainContent = getPlainText();
            if (plainContent.includes('<!DOCTYPE') || plainContent.includes('<html')) {
                showToast('内容异常，请重新生成节点', 1500);
                return;
            }
            const blob = new Blob([plainContent], { type: 'text/plain;charset=utf-8' });
            currentBlobUrl = URL.createObjectURL(blob);
            tempLinkUrl.innerText = currentBlobUrl;
            tempLinkCard.style.display = 'block';
            showToast('🔗 临时订阅链接已生成', 1500);
        }

        async function copyTempLink() {
            if (!currentBlobUrl) { showToast('请先点击「生成临时 .txt 链接」', 1000); return; }
            await navigator.clipboard.writeText(currentBlobUrl);
            showToast('临时链接已复制', 1200);
        }

        function openTempLink() {
            if (!currentBlobUrl) { showToast('无临时链接，请先生成', 1000); return; }
            window.open(currentBlobUrl, '_blank');
        }

        // 预设下拉联动
        presetSelect.addEventListener('change', () => {
            ipSourceInput.value = presetSelect.value;
            showToast('IP来源已切换', 1000);
        });

        generateBtn.addEventListener('click', () => {
            let uuid = uuidInput.value.trim() || DEFAULTS.uuid;
            let domain = domainInput.value.trim() || DEFAULTS.domain;
            let custom3 = custom3Input.value.trim() || DEFAULTS.custom3;
            let customPath = customPathInput.value.trim();
            let ipSource = ipSourceInput.value.trim() || DEFAULTS.ipSource;
            for (let opt of presetSelect.options) if (opt.value === ipSource) presetSelect.selectedIndex = opt.index;
            generateNodes(uuid, domain, ipSource, custom3, customPath);
        });

        copyAllBtn.addEventListener('click', copyAllNodes);
        downloadTxtBtn.addEventListener('click', downloadTxtFile);
        genBlobLinkBtn.addEventListener('click', generateAndShowBlobLink);
        copyTempLinkBtn.addEventListener('click', copyTempLink);
        openTempLinkBtn.addEventListener('click', openTempLink);

        // 初始加载默认节点
        generateNodes(DEFAULTS.uuid, DEFAULTS.domain, DEFAULTS.ipSource, DEFAULTS.custom3, '');
    })();
</script>
</body>
</html>
