<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VLESS节点生成器 | 纯文本订阅 & 自定义Path</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            padding: 28px;
            position: relative;
        }
        
        h1 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 1.9rem;
            text-align: center;
            font-weight: 700;
        }
        
        #results {
            margin-top: 25px;
        }
        
        .copy-all-btn {
            display: inline-block;
            padding: 12px 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }
        
        .generate-btn {
            background-color: #FF9800;
        }
        
        .subscribe-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        
        .blob-btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        
        .copy-all-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
        }
        
        .input-group {
            margin: 18px 0;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #0f172a;
            font-size: 0.85rem;
        }
        
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 20px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.9rem;
        }
        
        .helper-note {
            font-size: 12px;
            color: #ea580c;
            text-align: center;
            background: #fff7ed;
            padding: 8px 12px;
            border-radius: 40px;
            margin: 14px 0;
        }
        
        .flex-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 12px;
            flex-wrap: wrap;
        }
        
        .sub-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 16px 18px;
            margin: 20px 0 0;
            border: 1px solid #e2e8f0;
        }
        
        .sub-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .sub-content-preview {
            background: #0f172a;
            color: #a5f3fc;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 12px;
            border-radius: 18px;
            word-break: break-all;
            margin: 10px 0;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .small-btn {
            background: #334155;
            padding: 8px 18px;
            font-size: 0.8rem;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        
        .blob-link-area {
            margin-top: 12px;
            padding: 10px;
            background: #eef2ff;
            border-radius: 16px;
            font-size: 0.75rem;
            word-break: break-all;
        }
        
        .blob-link-area a {
            color: #2563eb;
            text-decoration: underline;
        }
        
        @media (max-width: 680px) {
            .container { padding: 18px; }
            .flex-btns { flex-direction: column; }
            .copy-all-btn { width: 100%; }
        }
        
        .badge {
            background: #e9ecef;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.7rem;
        }
        
        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.85rem;
            z-index: 1000;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 8px;">
        <a href="https://github.com/gslege/CloudflareIP" target="_blank" style="color: #FF9800; text-decoration: none; font-weight: 600;">📦 作者GitHub</a>
    </div>

    <h1>✈️ VLESS 节点生成器</h1>
    <div class="helper-note">
        ⚡ 支持自定义Path（例如 <code>/?ed=2560&PROT_TYPE=vless</code>） | 纯文本订阅内容
    </div>

    <div class="input-group">
        <label>🔑 UUID</label>
        <input type="text" id="uuidInput" placeholder="7c45da23-4924-47eb-8426-45017280e5e7" value="7c45da23-4924-47eb-8426-45017280e5e7">
    </div>

    <div class="input-group">
        <label>🌐 部署域名 (SNI / Host)</label>
        <input type="text" id="domainInput" placeholder="img.xiguanjiuhao33.ccwu.cc" value="img.xiguanjiuhao33.ccwu.cc">
    </div>

    <div class="input-group">
        <label>🛸 反代IP (传统模式)</label>
        <input type="text" id="custom3Input" placeholder="bpb.yousef.isegaro.com" value="bpb.yousef.isegaro.com">
    </div>

    <div class="input-group">
        <label>🛤️ 自定义Path路径 (可选)</label>
        <input type="text" id="customPathInput" placeholder="例如: /?ed=2560&PROT_TYPE=vless">
    </div>

    <div class="input-group">
        <label>📡 IP/域名来源</label>
        <select id="presetIpSelect" style="margin-bottom: 10px;">
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt">🇨🇳 me运营商IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt">🇸🇬 sg新加坡IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt">🇯🇵 jp日本IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt">🇺🇸 us美国IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/DE.txt">🇩🇪 de德国IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/NL.txt">🇳🇱 nl荷兰IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/country.txt">🌍 country网络IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cdtools.txt">⚡ cdtools优选IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt">📡 cf测速IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/More.txt">📚 more更多IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Domain.txt">🔗 domain优选域名</option>
        </select>
        <input type="text" id="ipSourceInput" placeholder="自定义IP列表URL" value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt">
    </div>

    <div class="flex-btns">
        <button id="generateBtn" class="copy-all-btn generate-btn">🚀 生成节点</button>
        <button id="copyAllBtn" class="copy-all-btn">📋 复制全部节点</button>
        <button id="showSubscribeBtn" class="copy-all-btn subscribe-btn">📄 显示订阅内容</button>
        <button id="genBlobLinkBtn" class="copy-all-btn blob-btn">🔗 生成临时 .txt 链接</button>
    </div>

    <div id="results"></div>

    <div id="subscriptionCard" class="sub-card" style="display: none;">
        <div class="sub-header">
            <span>📄 纯文本订阅内容</span>
            <button id="copySubTextBtn" class="small-btn">📋 复制内容</button>
            <button id="downloadSubBtn" class="small-btn">💾 下载 .txt</button>
        </div>
        <div id="subContentPreview" class="sub-content-preview"></div>
    </div>

    <div id="blobLinkCard" class="sub-card" style="display: none; margin-top: 15px;">
        <div class="sub-header">
            <span>🔗 临时订阅链接 (blob:)</span>
            <button id="copyBlobUrlBtn" class="small-btn">📋 复制链接</button>
        </div>
        <div id="blobLinkDisplay" class="blob-link-area"></div>
        <div style="font-size: 11px; color: #dc2626; margin-top: 8px;">⚠️ 该链接仅在当前浏览器标签页有效，刷新后失效。部分客户端不支持 blob 协议，建议使用「下载 .txt」或「复制内容」。</div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const uuidInput = document.getElementById('uuidInput');
        const domainInput = document.getElementById('domainInput');
        const custom3Input = document.getElementById('custom3Input');
        const customPathInput = document.getElementById('customPathInput');
        const ipSourceInput = document.getElementById('ipSourceInput');
        const presetSelect = document.getElementById('presetIpSelect');
        const generateBtn = document.getElementById('generateBtn');
        const copyAllBtn = document.getElementById('copyAllBtn');
        const showSubscribeBtn = document.getElementById('showSubscribeBtn');
        const genBlobLinkBtn = document.getElementById('genBlobLinkBtn');
        const resultsDiv = document.getElementById('results');
        const subscriptionCard = document.getElementById('subscriptionCard');
        const subContentPreview = document.getElementById('subContentPreview');
        const copySubTextBtn = document.getElementById('copySubTextBtn');
        const downloadSubBtn = document.getElementById('downloadSubBtn');
        const blobLinkCard = document.getElementById('blobLinkCard');
        const blobLinkDisplay = document.getElementById('blobLinkDisplay');
        const copyBlobUrlBtn = document.getElementById('copyBlobUrlBtn');

        const DEFAULT_UUID = '7c45da23-4924-47eb-8426-45017280e5e7';
        const DEFAULT_DOMAIN = 'img.xiguanjiuhao33.ccwu.cc';
        const DEFAULT_CUSTOM3 = 'bpb.yousef.isegaro.com';
        const DEFAULT_IP_SOURCE = 'https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt';

        let currentVlessLinks = [];
        let currentBlobUrl = null;

        presetSelect.addEventListener('change', () => {
            ipSourceInput.value = presetSelect.value;
            showToast('✓ IP来源已切换', 1000);
        });

        function showToast(msg, duration = 1800) {
            const toast = document.createElement('div');
            toast.className = 'toast-msg';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function buildVlessLink(ipOrDomain, nodeName, uuid, domain, custom3, customPath) {
            const baseParams = {
                encryption: 'none',
                security: 'tls',
                sni: domain,
                fp: 'random',
                insecure: '0',
                allowInsecure: '0',
                type: 'ws',
                host: domain
            };
            let finalPath = (customPath && customPath.trim()) ? customPath.trim() : `pyip=${custom3}`;
            let encodedPath = encodeURIComponent(finalPath);
            const queryParts = [];
            for (const [k, v] of Object.entries(baseParams)) queryParts.push(`${k}=${encodeURIComponent(v)}`);
            queryParts.push(`path=${encodedPath}`);
            const queryString = queryParts.join('&');
            let encodedName = encodeURIComponent(nodeName);
            return `vless://${uuid}@${ipOrDomain}:443?${queryString}#${encodedName}`;
        }

        async function generateLinks(uuid, domain, ipSourceUrl, custom3, customPathRaw) {
            resultsDiv.innerHTML = '<p>⏳ 获取列表中...</p>';
            subscriptionCard.style.display = 'none';
            blobLinkCard.style.display = 'none';
            if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
            
            try {
                const resp = await fetch(ipSourceUrl);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const content = await resp.text();
                const lines = content.split(/\r?\n/).filter(l => l.trim());
                const ipDomainRegex = /^((?:\d{1,3}\.){3}\d{1,3}|(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,})$/;
                const nodes = [];
                for (let idx = 0; idx < lines.length; idx++) {
                    let line = lines[idx].trim();
                    let ipOrDomain = '', nodeName = '';
                    if (line.includes('#')) {
                        let parts = line.split('#');
                        ipOrDomain = parts[0].trim();
                        nodeName = parts.slice(1).join('#').trim() || `节点${idx+1}`;
                    } else {
                        ipOrDomain = line;
                        nodeName = `节点${idx+1}`;
                    }
                    if (!ipDomainRegex.test(ipOrDomain)) continue;
                    const link = buildVlessLink(ipOrDomain, nodeName, uuid, domain, custom3, customPathRaw);
                    nodes.push({ name: nodeName, link });
                }
                if (nodes.length === 0) throw new Error('无有效IP/域名');
                currentVlessLinks = nodes.map(n => n.link);
                let ulHtml = `<ul style="list-style:none; padding:0;">`;
                for (const item of nodes) {
                    ulHtml += `<li data-link="${escapeHtml(item.link)}" style="background:#f8fafc; border-radius:20px; padding:14px; margin-bottom:14px; border-left:5px solid #FF9800; cursor:pointer;">
                        <div style="font-weight:700; color:#ea580c;">📡 ${escapeHtml(item.name)} <span class="badge">点击复制</span></div>
                        <span class="link" style="display:block; font-size:0.75rem; background:#eef2ff; padding:8px; border-radius:14px; margin-top:6px;">${escapeHtml(item.link)}</span>
                        <span class="copy-tip" style="position:absolute; right:16px; top:18px; background:#10b981; color:white; padding:4px 12px; border-radius:30px; font-size:0.7rem; opacity:0; transition:0.2s;">✓ 已复制</span>
                    </li>`;
                }
                ulHtml += `</ul><p style="text-align:center; margin-top:15px;">✨ 共 ${nodes.length} 个节点</p>`;
                resultsDiv.innerHTML = ulHtml;
                attachCopyEvents();
                showToast(`✅ 生成 ${nodes.length} 个节点`, 1500);
            } catch (err) {
                resultsDiv.innerHTML = `<p>💥 生成失败: ${err.message}</p>`;
            }
        }

        function attachCopyEvents() {
            document.querySelectorAll('#results li').forEach(li => {
                if (li.dataset.listener) return;
                li.dataset.listener = 'true';
                li.addEventListener('click', async () => {
                    let link = li.dataset.link;
                    if (!link) {
                        let span = li.querySelector('.link');
                        if (span) link = span.textContent;
                    }
                    if (!link) return;
                    try {
                        await navigator.clipboard.writeText(link);
                        let tip = li.querySelector('.copy-tip');
                        if (tip) tip.style.opacity = '1';
                        li.style.backgroundColor = '#dcfce7';
                        setTimeout(() => {
                            li.style.backgroundColor = '';
                            if (tip) tip.style.opacity = '0';
                        }, 800);
                        showToast('✓ 节点已复制', 800);
                    } catch(e) {}
                });
            });
        }

        function getPlainText() { return currentVlessLinks.join('\n'); }

        function updatePreview() {
            if (!currentVlessLinks.length) subContentPreview.innerText = '暂无节点';
            else {
                let text = getPlainText();
                let lines = text.split('\n');
                let preview = lines.slice(0, 20).join('\n');
                if (lines.length > 20) preview += `\n... 共 ${lines.length} 行`;
                subContentPreview.innerText = preview;
            }
        }

        function showSubscription() {
            if (!currentVlessLinks.length) { showToast('请先生成节点', 1200); return; }
            updatePreview();
            subscriptionCard.style.display = 'block';
            blobLinkCard.style.display = 'none';
        }

        async function copyAll() {
            if (!currentVlessLinks.length) { showToast('无节点', 1000); return; }
            await navigator.clipboard.writeText(getPlainText());
            showToast(`📋 已复制 ${currentVlessLinks.length} 个节点`, 1500);
        }

        async function copySubText() {
            if (!currentVlessLinks.length) return;
            await navigator.clipboard.writeText(getPlainText());
            showToast('订阅内容已复制', 1200);
        }

        function downloadTxt() {
            if (!currentVlessLinks.length) return;
            const blob = new Blob([getPlainText()], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `vless_${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已下载 .txt 文件', 1200);
        }

        function generateBlobLink() {
            if (!currentVlessLinks.length) { showToast('请先生成节点', 1200); return; }
            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            const blob = new Blob([getPlainText()], { type: 'text/plain' });
            currentBlobUrl = URL.createObjectURL(blob);
            const linkHtml = `<a href="${currentBlobUrl}" target="_blank">${currentBlobUrl}</a><br><span style="color:#475569;">点击可查看内容，复制链接后可在部分客户端尝试导入（不稳定）</span>`;
            blobLinkDisplay.innerHTML = linkHtml;
            blobLinkCard.style.display = 'block';
            subscriptionCard.style.display = 'none';
            showToast('临时 blob: 链接已生成', 1500);
        }

        async function copyBlobUrl() {
            if (!currentBlobUrl) { showToast('请先生成临时链接', 1000); return; }
            await navigator.clipboard.writeText(currentBlobUrl);
            showToast('临时链接已复制', 1200);
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
        }

        function onGenerate() {
            let uuid = uuidInput.value.trim() || DEFAULT_UUID;
            let domain = domainInput.value.trim() || DEFAULT_DOMAIN;
            let custom3 = custom3Input.value.trim() || DEFAULT_CUSTOM3;
            let customPath = customPathInput.value.trim();
            let ipSource = ipSourceInput.value.trim() || DEFAULT_IP_SOURCE;
            for (let opt of presetSelect.options) if (opt.value === ipSource) presetSelect.selectedIndex = opt.index;
            generateLinks(uuid, domain, ipSource, custom3, customPath);
        }

        async function init() {
            uuidInput.value = DEFAULT_UUID;
            domainInput.value = DEFAULT_DOMAIN;
            custom3Input.value = DEFAULT_CUSTOM3;
            ipSourceInput.value = DEFAULT_IP_SOURCE;
            customPathInput.value = '';
            await generateLinks(DEFAULT_UUID, DEFAULT_DOMAIN, DEFAULT_IP_SOURCE, DEFAULT_CUSTOM3, '');
        }

        generateBtn.addEventListener('click', onGenerate);
        copyAllBtn.addEventListener('click', copyAll);
        showSubscribeBtn.addEventListener('click', showSubscription);
        copySubTextBtn.addEventListener('click', copySubText);
        downloadSubBtn.addEventListener('click', downloadTxt);
        genBlobLinkBtn.addEventListener('click', generateBlobLink);
        copyBlobUrlBtn.addEventListener('click', copyBlobUrl);

        init();
    });
</script>
</body>
</html>
