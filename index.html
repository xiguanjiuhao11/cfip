<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手搓VLESS节点生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2rem;
            text-align: center;
        }
        
        #results {
            margin-top: 20px;
        }
        
        #results p {
            color: #666;
            text-align: center;
            margin: 20px 0;
        }

        .copy-all-btn {
            display: inline-block;
            width: 48%;
            padding: 12px;
            margin: 10px 1%;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .copy-all-btn:hover {
            background-color: #45a049;
        }

        .copy-all-btn.copied {
            background-color: #2196F3;
        }
        
        .generate-btn {
            background-color: #FF9800;
        }
        
        .generate-btn:hover {
            background-color: #F57C00;
        }
        
        h2 {
            color: #444;
            margin: 20px 0;
            font-size: 1.5rem;
            border-bottom: 2px solid #FF9800;
            padding-bottom: 10px;
        }
        
        ul {
            list-style-type: none;
            padding: 0;
        }
        
        li {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #FF9800;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            text-align: left;
        }
        
        li:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        
        .link {
            display: block;
            font-size: 0.9rem;
            color: #666;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            margin-top: 5px;
        }
        
        .copy-tip {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #4CAF50;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .copy-all-btn {
                width: 100%;
                margin: 8px 0;
            }
            li {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="position:absolute; top:10px; right:10px;">
        <a href="https://github.com/gslege/CloudflareIP" target="_blank" style="color:#FF9800; font-weight:bold;">作者GitHub>></a>
    </div>

    <h1>手搓VLESS节点生成器</h1>

    <div style="margin:20px 0; text-align:left;">
        <label style="font-weight:bold;">UUID</label>
        <input type="text" id="uuidInput" placeholder="7c45da23-4924-47eb-8426-45017280e5e7" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:5px;">
    </div>

    <div style="margin:20px 0; text-align:left;">
        <label style="font-weight:bold;">反代IP</label>
        <input type="text" id="custom3Input" placeholder="bpb.yousef.isegaro.com" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:5px;">
    </div>

    <div style="margin:20px 0; text-align:left;">
        <label style="font-weight:bold;">部署域名</label>
        <input type="text" id="domainInput" placeholder="img.xiguanjiuhao33.ccwu.cc" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:5px;">
    </div>

    <div style="margin:20px 0; text-align:left;">
        <label style="font-weight:bold;">IP来源</label>
        <select id="presetIpSelect" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:5px;">
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Me.txt">me运营商IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt">sg新加坡IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt">jp日本IP</option>
            <option value="https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt">us美国IP</option>
        </select>
    </div>

    <button id="generateBtn" class="copy-all-btn generate-btn">一键生成节点</button>
    <button id="copyAllBtn" class="copy-all-btn">一键复制全部</button>

    <div id="results"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const defaultUUID = '7c45da23-4924-47eb-8426-45017280e5e7';
    const defaultDomain = 'img.xiguanjiuhao33.ccwu.cc';
    const defaultCustom3 = 'bpb.yousef.isegaro.com';

    // 全局存储所有生成的链接（关键修复）
    window.allGeneratedLinks = [];

    // 移动端最强复制函数（100%成功）
    function copyText(text) {
        return new Promise((resolve) => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            resolve(true);
        });
    }

    // 生成节点
    async function generateLinks(uuid, domain, ipSource, custom3) {
        const res = document.getElementById('results');
        res.innerHTML = '<p>加载中...</p>';
        window.allGeneratedLinks = [];

        try {
            const resp = await fetch(ipSource);
            const text = await resp.text();
            const lines = text.split('\n').filter(i => i.trim());

            let html = '';
            lines.forEach(line => {
                const [ip, name = '节点'] = line.split('#');
                if (!ip) return;
                const link = `vless://${uuid}@${ip}:443?encryption=none&security=tls&sni=${domain}&fp=random&type=ws&host=${domain}&path=pyip%3D${custom3}#${name}`;
                window.allGeneratedLinks.push(link);
                html += `<li>${name}<div class="link">${link}</div><span class="copy-tip">已复制</span></li>`;
            });

            res.innerHTML = `<ul>${html}</ul><p>共 ${window.allGeneratedLinks.length} 个节点</p>`;

            // 单击复制单个
            document.querySelectorAll('#results li').forEach(li => {
                li.onclick = async () => {
                    const link = li.querySelector('.link').innerText;
                    await copyText(link);
                    li.querySelector('.copy-tip').style.opacity = 1;
                    setTimeout(() => li.querySelector('.copy-tip').style.opacity = 0, 1000);
                };
            });

        } catch (e) {
            res.innerHTML = '<p>生成失败</p>';
        }
    }

    // 生成按钮
    document.getElementById('generateBtn').onclick = () => {
        const u = document.getElementById('uuidInput').value || defaultUUID;
        const d = document.getElementById('domainInput').value || defaultDomain;
        const c = document.getElementById('custom3Input').value || defaultCustom3;
        const ip = document.getElementById('presetIpSelect').value;
        generateLinks(u, d, ip, c);
    };

    // 【一键复制全部】修复完成
    document.getElementById('copyAllBtn').onclick = async () => {
        if (window.allGeneratedLinks.length === 0) {
            alert('请先生成节点');
            return;
        }
        const allText = window.allGeneratedLinks.join('\n');
        await copyText(allText);
        const btn = document.getElementById('copyAllBtn');
        const old = btn.innerText;
        btn.innerText = '✅ 复制全部成功';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.innerText = old;
            btn.classList.remove('copied');
        }, 1500);
    };

    // 默认生成
    generateLinks(defaultUUID, defaultDomain, document.getElementById('presetIpSelect').value, defaultCustom3);
});
</script>
</body>
</html>
